<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>
    <link rel="stylesheet" href="/blog/css/style.css?v=20260403">
    <script src="/lib/three.min.js"></script>
</head>
<body>
    <div class="background-pattern"></div>

    <header class="header">
        <nav class="top-nav">
            <a href="/blog/" class="nav-brand">
                <canvas id="threeCanvas" width="45" height="45"></canvas>
                <span class="brand-text">{{ site.name }}</span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog/" {% if page.url == '/blog/' or page.url == '/blog' %}class="active"{% endif %}>首页</a></li>
                <li><a href="/blog/技术分享/" {% if page.url contains '技术分享' %}class="active"{% endif %}>技术分享</a></li>
                <li><a href="/blog/生活感悟/" {% if page.url contains '生活感悟' %}class="active"{% endif %}>生活感悟</a></li>
                <li><a href="/blog/项目记录/" {% if page.url contains '项目记录' %}class="active"{% endif %}>项目记录</a></li>
            </ul>
        </nav>
    </header>

    <div class="article-wrapper">
        <aside class="article-toc" id="articleToc">
            <div class="toc-header">
                <span class="toc-title">目录</span>
                <button class="toc-toggle" id="tocToggle">全部</button>
            </div>
            <nav class="toc-nav" id="tocNav"></nav>
        </aside>
        <main class="main-container">
            <article class="content">
                {{ content }}
            </article>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}. All rights reserved.</p>
    </footer>

    <script>
        (function() {
            const canvas = document.getElementById('threeCanvas');
            if (!canvas) return;
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
            camera.position.z = 3;
            
            const renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(45, 45);
            renderer.setClearColor(0x000000, 0);
            
            const geometry = new THREE.IcosahedronGeometry(1, 0);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x58a6ff, 
                wireframe: true 
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            
            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.x += 0.008;
                mesh.rotation.y += 0.012;
                renderer.render(scene, camera);
            }
            animate();
        })();

        document.addEventListener('DOMContentLoaded', function() {
            const content = document.querySelector('.content');
            const tocNav = document.getElementById('tocNav');
            const articleToc = document.getElementById('articleToc');
            const tocToggle = document.getElementById('tocToggle');
            
            if (!content || !tocNav) return;
            
            const headings = content.querySelectorAll('h1, h2, h3');
            
            if (headings.length === 0) {
                articleToc.style.display = 'none';
                return;
            }
            
            let isAllExpanded = false;
            
            tocToggle.addEventListener('click', function() {
                isAllExpanded = !isAllExpanded;
                const groups = tocNav.querySelectorAll('.toc-group');
                const arrows = tocNav.querySelectorAll('.toc-arrow');
                
                groups.forEach((group, i) => {
                    const h2Count = tocNav.querySelectorAll('.toc-level-2').length;
                    const groupIndex = Math.floor(i / (h2Count || 1));
                    
                    if (isAllExpanded) {
                        group.style.display = 'block';
                        arrows[i].textContent = '▼';
                        arrows[i].classList.add('expanded');
                    } else {
                        group.style.display = 'none';
                        arrows[i].textContent = '▶';
                        arrows[i].classList.remove('expanded');
                    }
                });
                
                tocToggle.textContent = isAllExpanded ? '收起' : '全部';
            });
            
            const tocList = document.createElement('ul');
            tocList.className = 'toc-list';
            
            let currentGroup = null;
            let h2Index = -1;
            
            headings.forEach((heading, index) => {
                if (!heading.id) {
                    heading.id = 'heading-' + index;
                }
                
                const level = parseInt(heading.tagName.charAt(1));
                const titleText = heading.textContent.replace(/^[0-9]+、/, '').replace(/^[0-9]+\./, '').trim();
                
                if (level === 1) {
                    const li = document.createElement('li');
                    li.className = 'toc-item toc-level-1';
                    li.innerHTML = '<a href="#' + heading.id + '">' + titleText + '</a>';
                    tocList.appendChild(li);
                    currentGroup = null;
                } else if (level === 2) {
                    h2Index++;
                    
                    if (!currentGroup) {
                        currentGroup = document.createElement('li');
                        currentGroup.className = 'toc-group-item';
                    } else {
                        tocList.appendChild(currentGroup);
                        currentGroup = document.createElement('li');
                        currentGroup.className = 'toc-group-item';
                    }
                    
                    const group = document.createElement('div');
                    group.className = 'toc-group';
                    group.style.display = 'block';
                    
                    const header = document.createElement('div');
                    header.className = 'toc-group-header';
                    
                    const arrow = document.createElement('span');
                    arrow.className = 'toc-arrow expanded';
                    arrow.textContent = '▼';
                    
                    const a = document.createElement('a');
                    a.href = '#' + heading.id;
                    a.textContent = titleText;
                    
                    header.appendChild(arrow);
                    header.appendChild(a);
                    
                    header.addEventListener('click', function(e) {
                        if (e.target.tagName === 'A') return;
                        e.preventDefault();
                        const sublist = group.querySelector('.toc-sublist');
                        if (sublist.style.display === 'none') {
                            sublist.style.display = 'block';
                            arrow.textContent = '▼';
                            arrow.classList.add('expanded');
                        } else {
                            sublist.style.display = 'none';
                            arrow.textContent = '▶';
                            arrow.classList.remove('expanded');
                        }
                    });
                    
                    const sublist = document.createElement('ul');
                    sublist.className = 'toc-sublist toc-sublist-' + h2Index;
                    
                    group.appendChild(header);
                    group.appendChild(sublist);
                    currentGroup.appendChild(group);
                    tocList.appendChild(currentGroup);
                    currentGroup = null;
                    
                } else if (level === 3) {
                    const li = document.createElement('li');
                    li.className = 'toc-item toc-level-3';
                    li.innerHTML = '<a href="#' + heading.id + '">' + titleText + '</a>';
                    
                    const lastGroup = tocList.querySelector('.toc-group:last-child .toc-sublist:last-child');
                    if (lastGroup) {
                        lastGroup.appendChild(li);
                    }
                }
                
                const addClickHandler = (headingId, text) => {
                    const items = tocNav.querySelectorAll('a[href="#' + headingId + '"]');
                    items.forEach(item => {
                        item.addEventListener('click', function(e) {
                            e.preventDefault();
                            const target = document.getElementById(headingId);
                            if (target) {
                                const offset = 100;
                                const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                                window.scrollTo({ top: top, behavior: 'smooth' });
                            }
                        });
                    });
                };
                
                addClickHandler(heading.id, titleText);
            });
            
            tocNav.appendChild(tocList);
            
            function updateActiveHeading() {
                const scrollTop = window.pageYOffset;
                let activeIndex = 0;
                
                headings.forEach((heading, index) => {
                    const top = heading.getBoundingClientRect().top + window.pageYOffset;
                    if (scrollTop >= top - 150) {
                        activeIndex = index;
                    }
                });
                
                const items = tocNav.querySelectorAll('.toc-item a');
                items.forEach((item, index) => {
                    const headingId = item.getAttribute('href').replace('#', '');
                    if (headingId === headings[activeIndex]?.id) {
                        item.classList.add('active');
                        const parentLi = item.closest('li');
                        if (parentLi) {
                            const sublist = parentLi.querySelector('.toc-sublist');
                            if (sublist) {
                                sublist.style.display = 'block';
                                const arrow = parentLi.querySelector('.toc-arrow');
                                if (arrow) {
                                    arrow.textContent = '▼';
                                    arrow.classList.add('expanded');
                                }
                            }
                        }
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
            
            window.addEventListener('scroll', updateActiveHeading, { passive: true });
            updateActiveHeading();
        });
    </script>
</body>
</html>
