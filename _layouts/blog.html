<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>
    <link rel="stylesheet" href="/blog/css/style.css?v=20260403">
    <script src="/lib/three.min.js"></script>
</head>
<body>
    <div class="background-pattern"></div>

    <header class="header">
        <nav class="top-nav">
            <a href="/blog/" class="nav-brand">
                <canvas id="threeCanvas" width="45" height="45"></canvas>
                <span class="brand-text">{{ site.name }}</span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog/" {% if page.url == '/blog/' or page.url == '/blog' %}class="active"{% endif %}>首页</a></li>
                <li><a href="/blog/技术分享/" {% if page.url contains '技术分享' %}class="active"{% endif %}>技术分享</a></li>
                <li><a href="/blog/生活感悟/" {% if page.url contains '生活感悟' %}class="active"{% endif %}>生活感悟</a></li>
                <li><a href="/blog/项目记录/" {% if page.url contains '项目记录' %}class="active"{% endif %}>项目记录</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-container">
        <main class="content">
            {{ content }}
        </main>
    </div>

    <footer class="footer">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}. All rights reserved.</p>
    </footer>

    <script>
        (function() {
            const currentPath = decodeURIComponent(window.location.pathname);
            const navItems = document.querySelectorAll('.nav-links li a');
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (currentPath === href || currentPath === href.replace(/\/$/, '') || currentPath + '/' === href) {
                    item.classList.add('active');
                }
            });
        })();

        (function() {
            const canvas = document.getElementById('threeCanvas');
            if (!canvas) return;
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
            camera.position.z = 3;
            
            const renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(45, 45);
            renderer.setClearColor(0x000000, 0);
            
            const geometry = new THREE.IcosahedronGeometry(1, 0);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x58a6ff, 
                wireframe: true 
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            
            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.x += 0.008;
                mesh.rotation.y += 0.012;
                renderer.render(scene, camera);
            }
            animate();
        })();
    </script>
</body>
</html>
