<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>
    <link rel="stylesheet" href="/blog/css/style.css?v=20260403">
    <script src="/lib/three.min.js"></script>
</head>
<body>
    <div class="background-pattern"></div>

    <header class="header">
        <nav class="top-nav">
            <a href="/blog/" class="nav-brand">
                <canvas id="threeCanvas" width="45" height="45"></canvas>
                <span class="brand-text">{{ site.name }}</span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog/" {% if page.url == '/blog/' or page.url == '/blog' %}class="active"{% endif %}>首页</a></li>
                <li><a href="/blog/技术分享/" {% if page.url contains '技术分享' %}class="active"{% endif %}>技术分享</a></li>
                <li><a href="/blog/生活感悟/" {% if page.url contains '生活感悟' %}class="active"{% endif %}>生活感悟</a></li>
                <li><a href="/blog/项目记录/" {% if page.url contains '项目记录' %}class="active"{% endif %}>项目记录</a></li>
            </ul>
        </nav>
    </header>

    <div class="article-wrapper">
        <aside class="article-toc" id="articleToc">
            <div class="toc-title">目录</div>
            <nav class="toc-nav" id="tocNav"></nav>
        </aside>
        <main class="main-container">
            <article class="content">
                {{ content }}
            </article>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}. All rights reserved.</p>
    </footer>

    <script>
        (function() {
            const currentPath = decodeURIComponent(window.location.pathname);
            const navItems = document.querySelectorAll('.nav-links li a');
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (currentPath === href || currentPath === href.replace(/\/$/, '') || currentPath + '/' === href) {
                    item.classList.add('active');
                }
            });
        })();

        (function() {
            const canvas = document.getElementById('threeCanvas');
            if (!canvas) return;
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
            camera.position.z = 3;
            
            const renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(45, 45);
            renderer.setClearColor(0x000000, 0);
            
            const geometry = new THREE.IcosahedronGeometry(1, 0);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x58a6ff, 
                wireframe: true 
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            
            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.x += 0.008;
                mesh.rotation.y += 0.012;
                renderer.render(scene, camera);
            }
            animate();
        })();

        document.addEventListener('DOMContentLoaded', function() {
            const content = document.querySelector('.content');
            const tocNav = document.getElementById('tocNav');
            const articleToc = document.getElementById('articleToc');
            
            if (!content || !tocNav) return;
            
            const headings = content.querySelectorAll('h1, h2, h3');
            
            if (headings.length === 0) {
                articleToc.style.display = 'none';
                return;
            }
            
            const tocList = document.createElement('ul');
            tocList.className = 'toc-list';
            
            headings.forEach((heading, index) => {
                if (!heading.id) {
                    heading.id = 'heading-' + index;
                }
                
                const level = parseInt(heading.tagName.charAt(1));
                const li = document.createElement('li');
                li.className = 'toc-item toc-level-' + level;
                
                const a = document.createElement('a');
                a.href = '#' + heading.id;
                a.textContent = heading.textContent.replace(/[0-9]+、/g, '').trim();
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.getElementById(heading.id);
                    if (target) {
                        const offset = 80;
                        const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                        window.scrollTo({ top: top, behavior: 'smooth' });
                    }
                });
                
                li.appendChild(a);
                tocList.appendChild(li);
            });
            
            tocNav.appendChild(tocList);
            
            function updateActiveHeading() {
                const scrollTop = window.pageYOffset;
                let activeIndex = 0;
                
                headings.forEach((heading, index) => {
                    const top = heading.getBoundingClientRect().top + window.pageYOffset;
                    if (scrollTop >= top - 100) {
                        activeIndex = index;
                    }
                });
                
                const items = tocNav.querySelectorAll('.toc-item');
                items.forEach((item, index) => {
                    item.classList.toggle('active', index === activeIndex);
                });
            }
            
            window.addEventListener('scroll', updateActiveHeading, { passive: true });
            updateActiveHeading();
        });
    </script>
</body>
</html>
