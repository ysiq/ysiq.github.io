<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>
    <link rel="stylesheet" href="/blog/css/style.css?v=20260403">
    <script src="/lib/three.min.js"></script>
</head>
<body>
    <div class="background-pattern"></div>

    <header class="header">
        <nav class="top-nav">
            <a href="/blog/" class="nav-brand">
                <canvas id="threeCanvas" width="45" height="45"></canvas>
                <span class="brand-text">{{ site.name }}</span>
            </a>
            <ul class="nav-links">
                <li><a href="/blog/">首页</a></li>
                <li><a href="/blog/技术分享/">技术分享</a></li>
                <li><a href="/blog/生活感悟/">生活感悟</a></li>
                <li><a href="/blog/项目记录/">项目记录</a></li>
            </ul>
        </nav>
    </header>

    <div class="article-wrapper">
        <aside class="article-toc" id="articleToc">
            <div class="toc-header">
                <span class="toc-title">目录</span>
                <button class="toc-toggle" id="tocToggle">收起</button>
            </div>
            <nav class="toc-nav" id="tocNav"></nav>
        </aside>
        <main class="main-container">
            <article class="content">
                {{ content }}
            </article>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('threeCanvas');
            if (canvas) {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
                camera.position.z = 3;
                
                const renderer = new THREE.WebGLRenderer({ 
                    canvas: canvas, 
                    antialias: true, 
                    alpha: true 
                });
                renderer.setSize(45, 45);
                renderer.setClearColor(0x000000, 0);
                
                const geometry = new THREE.IcosahedronGeometry(1, 0);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x58a6ff, 
                    wireframe: true 
                });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                
                function animate() {
                    requestAnimationFrame(animate);
                    mesh.rotation.x += 0.008;
                    mesh.rotation.y += 0.012;
                    renderer.render(scene, camera);
                }
                animate();
            }

            const currentPath = decodeURIComponent(window.location.pathname);
            const navLinks = document.querySelectorAll('.nav-links a');
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (currentPath === href || currentPath === href + '/' || currentPath.startsWith(href + '/')) {
                    link.classList.add('active');
                }
            });

            const content = document.querySelector('.content');
            const tocNav = document.getElementById('tocNav');
            const articleToc = document.getElementById('articleToc');
            const tocToggle = document.getElementById('tocToggle');
            
            if (!content || !tocNav) return;
            
            const headings = content.querySelectorAll('h1, h2, h3');
            
            if (headings.length === 0) {
                articleToc.style.display = 'none';
                return;
            }
            
            let isAllExpanded = true;
            
            tocToggle.addEventListener('click', function() {
                isAllExpanded = !isAllExpanded;
                const sections = tocNav.querySelectorAll('.toc-section');
                
                sections.forEach((section, i) => {
                    const arrow = section.querySelector('.toc-arrow');
                    const sublist = section.querySelector('.toc-sublist');
                    
                    if (isAllExpanded) {
                        if (sublist) sublist.style.display = 'block';
                        if (arrow) arrow.textContent = '▼';
                    } else {
                        if (sublist) sublist.style.display = 'none';
                        if (arrow) arrow.textContent = '▶';
                    }
                });
                
                tocToggle.textContent = isAllExpanded ? '收起' : '展开';
            });
            
            const tocList = document.createElement('ul');
            tocList.className = 'toc-list';
            
            let h1Sections = [];
            let currentH1 = null;
            let currentH2 = null;
            let h1Index = 0;
            
            headings.forEach((heading, index) => {
                if (!heading.id) {
                    heading.id = 'heading-' + index;
                }
                
                const level = parseInt(heading.tagName.charAt(1));
                const titleText = heading.textContent.replace(/^[0-9]+、/, '').replace(/^[0-9]+\./, '').trim();
                
                if (level === 1) {
                    h1Index++;
                    currentH1 = {
                        id: heading.id,
                        title: titleText,
                        level: 1,
                        h2Items: []
                    };
                    h1Sections.push(currentH1);
                    currentH2 = null;
                } else if (level === 2) {
                    if (currentH1) {
                        currentH2 = {
                            id: heading.id,
                            title: titleText,
                            level: 2,
                            h3Items: []
                        };
                        currentH1.h2Items.push(currentH2);
                    }
                } else if (level === 3) {
                    if (currentH2) {
                        currentH2.h3Items.push({
                            id: heading.id,
                            title: titleText,
                            level: 3
                        });
                    } else if (currentH1) {
                        currentH1.h2Items.push({
                            id: heading.id,
                            title: titleText,
                            level: 2,
                            h3Items: []
                        });
                    }
                }
            });
            
            h1Sections.forEach((section, sIndex) => {
                const li = document.createElement('li');
                li.className = 'toc-section';
                
                if (section.h2Items.length > 0) {
                    const header = document.createElement('div');
                    header.className = 'toc-header-item';
                    
                    const arrow = document.createElement('span');
                    arrow.className = 'toc-arrow expanded';
                    arrow.textContent = '▼';
                    
                    const a = document.createElement('a');
                    a.href = '#' + section.id;
                    a.textContent = section.title;
                    
                    header.appendChild(arrow);
                    header.appendChild(a);
                    
                    header.addEventListener('click', function(e) {
                        if (e.target.tagName === 'A') return;
                        e.preventDefault();
                        const sublist = li.querySelector('.toc-sublist');
                        if (sublist.style.display === 'none') {
                            sublist.style.display = 'block';
                            arrow.textContent = '▼';
                            arrow.classList.add('expanded');
                        } else {
                            sublist.style.display = 'none';
                            arrow.textContent = '▶';
                            arrow.classList.remove('expanded');
                        }
                    });
                    
                    li.appendChild(header);
                    
                    const sublist = document.createElement('ul');
                    sublist.className = 'toc-sublist';
                    
                    section.h2Items.forEach(item => {
                        const subLi = document.createElement('li');
                        subLi.className = 'toc-sub-item';
                        
                        if (item.h3Items && item.h3Items.length > 0) {
                            const subHeader = document.createElement('div');
                            subHeader.className = 'toc-header-item toc-sub-header';
                            
                            const subArrow = document.createElement('span');
                            subArrow.className = 'toc-arrow expanded';
                            subArrow.textContent = '▼';
                            
                            const subA = document.createElement('a');
                            subA.href = '#' + item.id;
                            subA.textContent = item.title;
                            
                            subHeader.appendChild(subArrow);
                            subHeader.appendChild(subA);
                            
                            subHeader.addEventListener('click', function(e) {
                                if (e.target.tagName === 'A') return;
                                e.preventDefault();
                                const subSublist = subLi.querySelector('.toc-subsublist');
                                if (subSublist.style.display === 'none') {
                                    subSublist.style.display = 'block';
                                    subArrow.textContent = '▼';
                                    subArrow.classList.add('expanded');
                                } else {
                                    subSublist.style.display = 'none';
                                    subArrow.textContent = '▶';
                                    subArrow.classList.remove('expanded');
                                }
                            });
                            
                            subLi.appendChild(subHeader);
                            
                            const subSublist = document.createElement('ul');
                            subSublist.className = 'toc-subsublist';
                            
                            item.h3Items.forEach(h3Item => {
                                const h3Li = document.createElement('li');
                                h3Li.innerHTML = '<a href="#' + h3Item.id + '">' + h3Item.title + '</a>';
                                subSublist.appendChild(h3Li);
                            });
                            
                            subLi.appendChild(subSublist);
                        } else {
                            subLi.innerHTML = '<a href="#' + item.id + '">' + item.title + '</a>';
                        }
                        
                        sublist.appendChild(subLi);
                    });
                    
                    li.appendChild(sublist);
                } else {
                    li.innerHTML = '<a href="#' + section.id + '">' + section.title + '</a>';
                }
                
                tocList.appendChild(li);
            });
            
            tocNav.appendChild(tocList);
            
            tocNav.querySelectorAll('a').forEach(a => {
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').replace('#', '');
                    const target = document.getElementById(targetId);
                    if (target) {
                        const offset = 100;
                        const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                        window.scrollTo({ top: top, behavior: 'smooth' });
                    }
                });
            });
            
            function updateActiveHeading() {
                const scrollTop = window.pageYOffset;
                let activeHeading = null;
                
                headings.forEach(heading => {
                    const top = heading.getBoundingClientRect().top + window.pageYOffset;
                    if (scrollTop >= top - 150) {
                        activeHeading = heading;
                    }
                });
                
                tocNav.querySelectorAll('a').forEach(a => {
                    a.classList.remove('active');
                });
                
                if (activeHeading) {
                    const activeLink = tocNav.querySelector('a[href="#' + activeHeading.id + '"]');
                    if (activeLink) {
                        activeLink.classList.add('active');
                    }
                }
            }
            
            window.addEventListener('scroll', updateActiveHeading, { passive: true });
            updateActiveHeading();
        });
    </script>
</body>
</html>
