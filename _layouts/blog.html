<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>

    <link rel="stylesheet" href="/blog/css/style.css?v=20260331">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="avatar">
                <span>{{ site.name | slice: 0 }}</span>
            </div>
            <h1 class="site-title">{{ site.name }}</h1>
            <p class="site-subtitle">技术 & 生活</p>
        </div>
        <nav class="sidebar-nav">
            <a href="/blog/" class="nav-item {% if page.url == '/blog/' %}active{% endif %}">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </a>
        <a href="/blog/技术分享/" class="nav-item {% if page.url == '/blog/技术分享/' or page.url == '/blog/技术分享' %}active{% endif %}">
            <span class="nav-icon">💻</span>
            <span>技术分享</span>
        </a>
        <a href="/blog/生活感悟/" class="nav-item {% if page.url == '/blog/生活感悟/' or page.url == '/blog/生活感悟' %}active{% endif %}">
            <span class="nav-icon">🌿</span>
            <span>生活感悟</span>
        </a>
        <a href="/blog/项目记录/" class="nav-item {% if page.url == '/blog/项目记录/' or page.url == '/blog/项目记录' %}active{% endif %}">
            <span class="nav-icon">🚀</span>
            <span>项目记录</span>
        </a>
        </nav>
        <div class="sidebar-footer">
            <div class="social-links">
                <a href="https://github.com" target="_blank" class="social-link" title="GitHub">
                    <svg height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
                <a href="mailto:example@email.com" class="social-link" title="邮箱">
                    <svg height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <header class="mobile-header">
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <span class="mobile-title">{{ site.name }}</span>
        </header>

        <main class="content">
            {{ content }}
        </main>

        <footer class="footer">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}. All rights reserved.</p>
        </footer>
    </div>

    <div class="overlay" id="overlay"></div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const overlay = document.getElementById('overlay');
        const sidebar = document.querySelector('.sidebar');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        // 动态设置导航激活状态
        (function() {
            const currentPath = decodeURIComponent(window.location.pathname);
            const navItems = document.querySelectorAll('.sidebar-nav .nav-item');
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (currentPath === href || currentPath === href.replace(/\/$/, '') || currentPath + '/' === href) {
                    item.classList.add('active');
                }
            });
        })();
    </script>
</body>
</html>
